<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .success { color: green; }
        .error { color: red; }
        button { padding: 10px 20px; margin: 10px 0; cursor: pointer; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Client Portal - 部署成功！</h1>
        <p>如果你能看到这个页面，说明Vercel部署已经成功了！</p>
        
        <h2>功能测试</h2>
        <button onclick="testAPI()">测试API连接</button>
        <button onclick="testLogin()">测试登录功能</button>
        <button onclick="testAllAPIs()">测试所有API</button>
        
        <div id="result"></div>
        
        <h2>系统信息</h2>
        <ul>
            <li><strong>项目</strong>: Client Portal 权限管理系统</li>
            <li><strong>版本</strong>: 1.0.0</li>
            <li><strong>部署时间</strong>: <span id="deployTime"></span></li>
            <li><strong>登录凭据</strong>: admin / admin123</li>
        </ul>
        
        <h2>可用功能</h2>
        <ul>
            <li>✅ 账号管理 (8个测试账号)</li>
            <li>✅ 角色管理 (4个角色)</li>
            <li>✅ 菜单管理 (完整菜单结构)</li>
            <li>✅ 权限查看 (权限矩阵)</li>
            <li>✅ 审计日志 (操作记录)</li>
            <li>✅ Mock数据 (丰富的测试数据)</li>
        </ul>
        
        <h2>快速链接</h2>
        <p>
            <a href="/api-test.html" target="_blank">🔧 API测试页面</a> |
            <a href="https://github.com/moyi5603/client-portal" target="_blank">📁 GitHub仓库</a>
        </p>
    </div>

    <script>
        // 显示部署时间
        document.getElementById('deployTime').textContent = new Date().toLocaleString();
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在测试API连接...</p>';
            
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ API连接成功！</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    throw new Error('API返回失败');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ API连接失败</h3>
                        <p>错误: ${error.message}</p>
                        <p>注意: 当前部署可能只包含静态文件，API功能需要serverless functions支持。</p>
                    </div>
                `;
            }
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在测试登录功能...</p>';
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ 登录测试成功！</h3>
                            <p>用户: ${data.data.user.username}</p>
                            <p>账号类型: ${data.data.user.accountType}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    throw new Error(data.error || '登录失败');
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ 登录测试失败</h3>
                        <p>错误: ${error.message}</p>
                        <p>注意: 当前部署可能只包含静态文件，登录功能需要serverless functions支持。</p>
                    </div>
                `;
            }
        }
        
        async function testAllAPIs() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>正在测试所有API...</p>';
            
            const apis = [
                '/api/simple-test',
                '/api/test',
                '/api/hello', 
                '/api/accounts',
                '/api/roles',
                '/api/menus',
                '/api/audit-logs',
                '/api/customers',
                '/api/facilities',
                '/api/permission-matrix',
                '/api/user-pages'
            ];
            
            let results = [];
            
            for (const api of apis) {
                try {
                    const response = await fetch(api);
                    const data = await response.json();
                    results.push({
                        api,
                        status: 'success',
                        statusCode: response.status,
                        data: data
                    });
                } catch (error) {
                    results.push({
                        api,
                        status: 'error',
                        error: error.message
                    });
                }
            }
            
            const successCount = results.filter(r => r.status === 'success').length;
            const totalCount = results.length;
            
            let html = `
                <div class="${successCount === totalCount ? 'success' : 'error'}">
                    <h3>${successCount === totalCount ? '✅' : '⚠️'} API测试完成</h3>
                    <p>成功: ${successCount}/${totalCount}</p>
                </div>
                <details>
                    <summary>查看详细结果</summary>
                    <div style="max-height: 400px; overflow-y: auto;">
            `;
            
            results.forEach(result => {
                if (result.status === 'success') {
                    html += `
                        <div style="margin: 10px 0; padding: 10px; background: #d4edda; border-radius: 4px;">
                            <strong>✅ ${result.api}</strong> (${result.statusCode})
                            <pre style="font-size: 12px; max-height: 100px; overflow-y: auto;">${JSON.stringify(result.data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    html += `
                        <div style="margin: 10px 0; padding: 10px; background: #f8d7da; border-radius: 4px;">
                            <strong>❌ ${result.api}</strong><br>
                            错误: ${result.error}
                        </div>
                    `;
                }
            });
            
            html += '</div></details>';
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
