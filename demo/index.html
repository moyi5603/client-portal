<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话式页面设计 - Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/antd@4.24.0/dist/antd.min.css">
    <link rel="stylesheet" href="demo.css">
</head>
<body>
    <div id="app">
        <div class="demo-header">
            <h1>🤖 对话式页面设计 Demo</h1>
            <p>通过自然语言对话创建个性化页面</p>
        </div>
        
        <div class="demo-container">
            <!-- 对话区域 -->
            <div class="chat-section">
                <div class="chat-header">
                    <h3>💬 对话设计</h3>
                    <button class="clear-btn" onclick="clearChat()">清空对话</button>
                </div>
                
                <div class="messages-container" id="messages">
                    <!-- 消息将在这里动态添加 -->
                </div>
                
                <div class="input-section">
                    <div class="quick-suggestions" id="suggestions">
                        <!-- 快速建议按钮 -->
                    </div>
                    <div class="input-area">
                        <textarea 
                            id="messageInput" 
                            placeholder="描述您想要创建的页面，例如：我想创建一个用户管理页面..."
                            rows="2"
                        ></textarea>
                        <button onclick="sendMessage()" id="sendBtn">发送</button>
                    </div>
                </div>
            </div>
            
            <!-- 预览区域 -->
            <div class="preview-section">
                <div class="preview-header">
                    <h3>👁️ 页面预览</h3>
                    <div class="preview-tabs">
                        <button class="tab-btn active" onclick="switchTab('preview')">预览</button>
                        <button class="tab-btn" onclick="switchTab('config')">配置</button>
                    </div>
                </div>
                
                <div class="preview-content">
                    <div id="preview-tab" class="tab-content active">
                        <div class="preview-placeholder" id="previewPlaceholder">
                            <div class="placeholder-icon">🎨</div>
                            <p>开始对话来生成页面预览</p>
                        </div>
                        <div class="preview-result" id="previewResult" style="display: none;">
                            <!-- 生成的页面预览将在这里显示 -->
                        </div>
                    </div>
                    
                    <div id="config-tab" class="tab-content">
                        <div class="config-display" id="configDisplay">
                            <p>页面配置信息将在这里显示</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 保存页面模态框 -->
        <div class="modal" id="saveModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>保存页面</h3>
                    <span class="close" onclick="closeSaveModal()">&times;</span>
                </div>
                <div class="modal-body">
                    <label for="pageName">页面名称：</label>
                    <input type="text" id="pageName" placeholder="请输入页面名称">
                    <label for="pageDescription">页面描述：</label>
                    <textarea id="pageDescription" placeholder="请输入页面描述" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button onclick="savePage()">保存</button>
                    <button onclick="closeSaveModal()">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="demo.js"></script>
</body>
</html>
