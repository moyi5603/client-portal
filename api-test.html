<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .result { margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 5px; }
        .success { border-left: 4px solid #28a745; }
        .error { border-left: 4px solid #dc3545; }
        pre { background: #e9ecef; padding: 15px; border-radius: 5px; overflow-x: auto; white-space: pre-wrap; }
        .test-section { margin: 30px 0; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; }
        h3 { color: #495057; margin-top: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 API 测试页面</h1>
        <p>测试所有API端点是否正常工作</p>
        
        <div class="test-section">
            <h3>基础测试</h3>
            <button onclick="testAPI('/api/test')">测试 /api/test</button>
            <button onclick="testAPI('/api/hello')">测试 /api/hello</button>
        </div>
        
        <div class="test-section">
            <h3>认证测试</h3>
            <button onclick="testLogin()">测试登录 (admin/admin123)</button>
        </div>
        
        <div class="test-section">
            <h3>数据API测试</h3>
            <button onclick="testAPI('/api/accounts')">测试账号API</button>
            <button onclick="testAPI('/api/roles')">测试角色API</button>
            <button onclick="testAPI('/api/menus')">测试菜单API</button>
            <button onclick="testAPI('/api/audit-logs')">测试审计日志API</button>
            <button onclick="testAPI('/api/customers')">测试客户API</button>
            <button onclick="testAPI('/api/facilities')">测试设施API</button>
            <button onclick="testAPI('/api/permission-matrix')">测试权限矩阵API</button>
            <button onclick="testAPI('/api/user-pages')">测试用户页面API</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        async function testAPI(endpoint) {
            const resultsDiv = document.getElementById('results');
            
            try {
                const response = await fetch(endpoint);
                const data = await response.json();
                
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h4>✅ ${endpoint} - 成功</h4>
                    <p><strong>状态码:</strong> ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                resultsDiv.appendChild(resultDiv);
                
            } catch (error) {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h4>❌ ${endpoint} - 失败</h4>
                    <p><strong>错误:</strong> ${error.message}</p>
                `;
                resultsDiv.appendChild(resultDiv);
            }
        }
        
        async function testLogin() {
            const resultsDiv = document.getElementById('results');
            
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h4>✅ 登录测试 - 成功</h4>
                    <p><strong>状态码:</strong> ${response.status}</p>
                    <p><strong>用户:</strong> ${data.data?.user?.username}</p>
                    <p><strong>账号类型:</strong> ${data.data?.user?.accountType}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                resultsDiv.appendChild(resultDiv);
                
            } catch (error) {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h4>❌ 登录测试 - 失败</h4>
                    <p><strong>错误:</strong> ${error.message}</p>
                `;
                resultsDiv.appendChild(resultDiv);
            }
        }
        
        // 清空结果
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
