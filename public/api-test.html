<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>API 测试页面</h1>
    
    <div class="test-section">
        <h3>认证API测试</h3>
        <button onclick="testAuth()">测试登录</button>
        <div id="auth-result"></div>
    </div>
    
    <div class="test-section">
        <h3>菜单API测试</h3>
        <button onclick="testMenus()">获取菜单</button>
        <div id="menus-result"></div>
    </div>
    
    <div class="test-section">
        <h3>角色API测试</h3>
        <button onclick="testRoles()">获取角色</button>
        <div id="roles-result"></div>
    </div>
    
    <div class="test-section">
        <h3>账号API测试</h3>
        <button onclick="testAccounts()">获取账号</button>
        <div id="accounts-result"></div>
    </div>

    <script>
        async function testAuth() {
            const resultDiv = document.getElementById('auth-result');
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        状态: ${response.status}<br>
                        响应: <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">错误: ${error.message}</div>`;
            }
        }

        async function testMenus() {
            const resultDiv = document.getElementById('menus-result');
            try {
                const response = await fetch('/api/menus');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        状态: ${response.status}<br>
                        数据条数: ${data.data ? data.data.length : 0}<br>
                        响应: <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">错误: ${error.message}</div>`;
            }
        }

        async function testRoles() {
            const resultDiv = document.getElementById('roles-result');
            try {
                const response = await fetch('/api/roles');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        状态: ${response.status}<br>
                        数据条数: ${data.data ? data.data.items.length : 0}<br>
                        响应: <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">错误: ${error.message}</div>`;
            }
        }

        async function testAccounts() {
            const resultDiv = document.getElementById('accounts-result');
            try {
                const response = await fetch('/api/accounts');
                const data = await response.json();
                resultDiv.innerHTML = `
                    <div class="${response.ok ? 'success' : 'error'}">
                        状态: ${response.status}<br>
                        数据条数: ${data.data ? data.data.items.length : 0}<br>
                        响应: <pre>${JSON.stringify(data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">错误: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
